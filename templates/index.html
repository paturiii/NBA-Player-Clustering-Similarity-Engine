{% extends "base.html" %}
{% block title %}NBA Playstyle Similarity{% endblock %}

{% block content %}
<div class="home">

  <div class="home__hero">
    <h1 class="home__title">Find players who play like your player</h1>
    <p class="home__sub">Search by career or by a specific season</p>
  </div>

  <div class="search-card">

    <!-- Player autocomplete -->
    <div class="field">
      <label class="field__label" for="player-input">Player</label>
      <div class="autocomplete">
        <input
          id="player-input"
          class="field__input"
          type="text"
          placeholder="e.g. Stephen Curry"
          autocomplete="off"
        />
        <ul class="autocomplete__list" id="autocomplete-list" hidden></ul>
      </div>
    </div>

    <!-- Season selector (populated after player is chosen) -->
    <div class="field">
      <label class="field__label" for="season-select">
        Season <span class="field__hint">— optional, leave blank for all-time</span>
      </label>
      <select id="season-select" class="field__select" disabled>
        <option value="">All-Time</option>
      </select>
    </div>

    <!-- k slider -->
    <div class="field">
      <label class="field__label">
        Results to return: <strong id="k-display">10</strong>
      </label>
      <input id="k-slider" class="slider" type="range" min="5" max="30" step="5" value="10" />
    </div>

    <button id="search-btn" class="btn btn--primary" disabled>Find Similar Players</button>

  </div>

  <!-- Loading -->
  <div class="spinner" id="spinner" hidden>
    <div class="spinner__ring"></div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg" hidden></div>

  <!-- Results -->
  <section class="results" id="results" hidden>
    <h2 class="results__title" id="results-title"></h2>
    <div class="results__grid" id="results-grid"></div>
  </section>

</div>
{% endblock %}

{% block scripts %}
<script>
// ── State ────────────────────────────────────────────────────────
let selectedPlayer = '';
let debounceTimer  = null;

const playerInput  = document.getElementById('player-input');
const acList       = document.getElementById('autocomplete-list');
const seasonSelect = document.getElementById('season-select');
const kSlider      = document.getElementById('k-slider');
const kDisplay     = document.getElementById('k-display');
const searchBtn    = document.getElementById('search-btn');
const spinner      = document.getElementById('spinner');
const errorMsg     = document.getElementById('error-msg');
const results      = document.getElementById('results');
const resultsTitle = document.getElementById('results-title');
const resultsGrid  = document.getElementById('results-grid');

// ── k slider ─────────────────────────────────────────────────────
kSlider.addEventListener('input', () => kDisplay.textContent = kSlider.value);

// ── Autocomplete ──────────────────────────────────────────────────
playerInput.addEventListener('input', () => {
  const q = playerInput.value.trim();
  selectedPlayer     = '';
  searchBtn.disabled = true;
  resetSeasonSelect();
  clearTimeout(debounceTimer);

  if (q.length < 2) { closeAC(); return; }
  debounceTimer = setTimeout(() => fetchSuggestions(q), 200);
});

async function fetchSuggestions(q) {
  const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=10`);
  const list = await res.json();

  acList.innerHTML = '';
  if (!list.length) { closeAC(); return; }

  list.forEach(name => {
    const li       = document.createElement('li');
    li.className   = 'autocomplete__item';
    li.textContent = name;
    li.addEventListener('mousedown', () => selectPlayer(name));
    acList.appendChild(li);
  });
  acList.hidden = false;
}

function selectPlayer(name) {
  selectedPlayer    = name;
  playerInput.value = name;
  closeAC();
  loadSeasons(name);
}

function closeAC() { acList.hidden = true; }
playerInput.addEventListener('blur', () => setTimeout(closeAC, 150));

// ── Season loader ─────────────────────────────────────────────────
async function loadSeasons(playerName) {
  const res  = await fetch(`/api/seasons/${encodeURIComponent(playerName)}`);
  const data = await res.json();
  if (data.error) return;

  seasonSelect.innerHTML = '<option value="">All-Time</option>';
  data.seasons.forEach(s => {
    const opt       = document.createElement('option');
    opt.value       = s;
    opt.textContent = s;
    seasonSelect.appendChild(opt);
  });
  seasonSelect.disabled  = false;
  searchBtn.disabled     = false;
}

function resetSeasonSelect() {
  seasonSelect.innerHTML = '<option value="">All-Time</option>';
  seasonSelect.disabled  = true;
}

// ── Search ────────────────────────────────────────────────────────
searchBtn.addEventListener('click', runSearch);

async function runSearch() {
  if (!selectedPlayer) return;

  const season = seasonSelect.value;
  const k      = kSlider.value;

  let url = `/api/similar?player=${encodeURIComponent(selectedPlayer)}&k=${k}`;
  if (season) url += `&season=${season}`;

  setLoading(true);
  hideError();
  results.hidden = true;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    renderResults(data);
  } catch {
    showError('Something went wrong. Please try again.');
  } finally {
    setLoading(false);
  }
}

// ── Render results ────────────────────────────────────────────────
function renderResults(data) {
  const { query, results: rows } = data;

  resultsTitle.textContent = query.mode === 'season'
    ? `Most similar to ${query.player} — ${query.season} Season`
    : `Most similar to ${query.player} — All-Time`;

  resultsGrid.innerHTML = '';

  rows.forEach((r, i) => {
    const pct  = Math.round(r.similarity * 100);
    const meta = query.mode === 'season'
      ? `<span class="tag">${r.pos}</span><span class="tag">${r.season}</span><span class="tag">${r.g}G</span>`
      : `<span class="tag">${r.pos || ''}</span><span class="tag">${r.season_count} seasons</span><span class="tag">${r.total_g}G</span>`;

    const card     = document.createElement('div');
    card.className = 'player-card';
    card.innerHTML = `
      <div class="player-card__rank">${i + 1}</div>
      <div class="player-card__body">
        <a class="player-card__name" href="/player/${encodeURIComponent(r.player)}">${r.player}</a>
        <div class="player-card__meta">${meta}</div>
        <div class="sim-bar"><div class="sim-bar__fill" style="width:${pct}%"></div></div>
        <div class="player-card__pct">${pct}% match</div>
      </div>`;
    resultsGrid.appendChild(card);
  });

  results.hidden = false;
}

// ── Helpers ───────────────────────────────────────────────────────
function setLoading(on)   { spinner.hidden  = !on; }
function showError(msg)   { errorMsg.textContent = msg; errorMsg.hidden = false; }
function hideError()      { errorMsg.hidden = true; }
</script>
{% endblock %}
